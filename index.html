<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game Ultimate</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #111;
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden; /* prevent scrolling on mobile */
    }

    canvas {
      background: #000;
      border: 2px solid #555;
    }

    #topbar {
      margin-bottom: 10px;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    button, select {
      padding: 6px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    #startMsg {
      margin-bottom: 10px;
      color: #aaa;
    }
    
    #title {
      margin-bottom: 10px;
      font-size: 28px;
      color: #7CFC00;
      letter-spacing: 2px;
    }

    /* MOBILE CONTROLS */
    .controls {
      position: fixed;
      bottom: 20px;
      text-align: center;
    }

    .controls button {
      font-size: 26px;
      padding: 15px;
      margin: 6px;
      border-radius: 10px;
      background: #222;
      color: white;
      border: 1px solid #555;
    }
  </style>
</head>

<body>

<h1 id="title">Snake Challenge I</h1>

<div id="startMsg">Press Arrow Keys to Start</div>

<div id="topbar">
  <div id="score">Score: 0</div>

  <button onclick="togglePause()">Pause</button>
  <button onclick="restartGame()">Restart</button>

  <label>
    Speed:
    <select onchange="changeSpeed(this.value)">
      <option value="200">Slow</option>
      <option value="120" selected>Normal</option>
      <option value="70">Fast</option>
    </select>
  </label>
</div>

<canvas id="game" width="400" height="400"></canvas>

<!-- BUTTON CONTROLS -->
<div class="controls">
  <button onclick="setDirection('up')">⬆️</button>
  <div>
    <button onclick="setDirection('left')">⬅️</button>
    <button onclick="setDirection('down')">⬇️</button>
    <button onclick="setDirection('right')">➡️</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake, direction, food, score;
let interval = null;
let foodTimer = null;
let speed = 120;
let paused = false;

const FOOD_LIFETIME = 6000;

// ---------------- INIT ----------------
function init() {
  snake = [{ x: 10, y: 10 }];
  direction = { x: 0, y: 0 };
  food = randomFood();
  score = 0;
  paused = false;

  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("startMsg").style.display = "block";
}

// ---------------- START GAME ----------------
function startGame() {
  if (interval) clearInterval(interval);
  if (foodTimer) clearInterval(foodTimer);

  interval = setInterval(gameLoop, speed);

  foodTimer = setInterval(() => {
    food = randomFood();
  }, FOOD_LIFETIME);
}

// ---------------- GAME LOOP ----------------
function gameLoop() {
  if (paused) return;
  update();
  draw();
}

// ---------------- UPDATE ----------------
function update() {

  if (direction.x === 0 && direction.y === 0) return;

  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  if (
    head.x < 0 || head.x >= tileCount ||
    head.y < 0 || head.y >= tileCount
  ) {
    gameOver();
    return;
  }

  for (let part of snake) {
    if (part.x === head.x && part.y === head.y) {
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {

    if (food.type === "red") score++;
    if (food.type === "blue") {
      snake.pop();
      if (snake.length <= 1) return gameOver();
    }
    if (food.type === "brown") return gameOver();

    document.getElementById("score").innerText = "Score: " + score;
    food = randomFood();

  } else {
    snake.pop();
  }
}

// ---------------- DRAW ----------------
function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "lime";
  for (let part of snake) {
    ctx.fillRect(
      part.x * gridSize,
      part.y * gridSize,
      gridSize - 2,
      gridSize - 2
    );
  }

  if (food.type === "red") ctx.fillStyle = "red";
  else if (food.type === "blue") ctx.fillStyle = "blue";
  else ctx.fillStyle = "brown";

  ctx.fillRect(
    food.x * gridSize,
    food.y * gridSize,
    gridSize - 2,
    gridSize - 2
  );
}

// ---------------- FOOD ----------------
function randomFood() {
  const r = Math.random();
  let type = r < 0.7 ? "red" : r < 0.9 ? "brown" : "blue";

  let newFood;
  while (true) {
    newFood = {
      x: Math.floor(Math.random() * tileCount),
      y: Math.floor(Math.random() * tileCount),
      type
    };

    if (!snake.some(p => p.x === newFood.x && p.y === newFood.y)) break;
  }

  return newFood;
}

// ---------------- CONTROLS ----------------
document.addEventListener("keydown", (e) => {
  handleDirection(e.key);
});

function setDirection(dir) {
  handleDirection(dir);
}

function handleDirection(key) {
  document.getElementById("startMsg").style.display = "none";

  if ((key === "ArrowUp" || key === "up") && direction.y !== 1)
    direction = { x: 0, y: -1 };

  if ((key === "ArrowDown" || key === "down") && direction.y !== -1)
    direction = { x: 0, y: 1 };

  if ((key === "ArrowLeft" || key === "left") && direction.x !== 1)
    direction = { x: -1, y: 0 };

  if ((key === "ArrowRight" || key === "right") && direction.x !== -1)
    direction = { x: 1, y: 0 };
}

// SWIPE SUPPORT
let startX = 0, startY = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;
  let dy = e.changedTouches[0].clientY - startY;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0) handleDirection("right");
    else handleDirection("left");
  } else {
    if (dy > 0) handleDirection("down");
    else handleDirection("up");
  }
});

// ---------------- UI ----------------
function togglePause() {
  paused = !paused;
}

function restartGame() {
  init();
  startGame();
}

function changeSpeed(newSpeed) {
  speed = parseInt(newSpeed);
  startGame();
}

// ---------------- GAME OVER ----------------
function gameOver() {
  alert("Game Over! Score: " + score);
  init();
  startGame();
}

// ---------------- BOOT ----------------
init();
startGame();
</script>

</body>
</html>
